<!DOCTYPE html>
<html lang="pt-br">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
 <title>Background Animated - Blocos Ascendentes com Rotação</title>
 <style>
 * {
 margin: 0;
 padding: 0;
 box-sizing: border-box;
 user-select: none;
 }

 body {
 min-height: 100vh;
 background-color: #000000;
 overflow: hidden;
 font-family: 'Segoe UI', 'Poppins', 'Orbitron', 'Montserrat', sans-serif;
 position: relative;
 }

 /* Canvas para os blocos */
 canvas {
 position: fixed;
 top: 0;
 left: 0;
 width: 100%;
 height: 100%;
 display: block;
 z-index: 1;
 pointer-events: none;
 }

 /* Container do título - centralizado */
 .title-container {
 position: absolute;
 top: 50%;
 left: 50%;
 transform: translate(-50%, -50%);
 z-index: 2;
 text-align: center;
 pointer-events: none;
 width: 100%;
 padding: 0 20px;
 }

 /* Título com linhas duplas (acima e abaixo) */
 .title-wrapper {
 display: inline-block;
 position: relative;
 }

 .title {
 font-size: clamp(2rem, 8vw, 5rem);
 font-weight: 800;
 letter-spacing: 6px;
 text-transform: uppercase;
 background: linear-gradient(135deg, #e0e0e0 0%, #888888 50%, #3a3a3a 100%);
 -webkit-background-clip: text;
 background-clip: text;
 color: transparent;
 text-shadow: 0 0 8px rgba(80,80,80,0.5), 0 2px 15px rgba(0,0,0,0.8);
 animation: titleGlow 3s infinite alternate ease-in-out;
 font-family: 'Segoe UI', 'Montserrat', 'Orbitron', monospace;
 position: relative;
 padding: 0 10px;
 }

 /* Linha superior */
 .title::before {
 content: '';
 position: absolute;
 top: -20px;
 left: 0;
 width: 100%;
 height: 3px;
 background: linear-gradient(90deg, transparent, #888, #ccc, #888, transparent);
 border-radius: 3px;
 animation: linePulse 3s infinite alternate ease-in-out;
 }

 /* Linha inferior */
 .title::after {
 content: '';
 position: absolute;
 bottom: -20px;
 left: 0;
 width: 100%;
 height: 3px;
 background: linear-gradient(90deg, transparent, #888, #ccc, #888, transparent);
 border-radius: 3px;
 animation: linePulse 3s infinite alternate ease-in-out;
 }

 @keyframes titleGlow {
 0% {
 text-shadow: 0 0 5px rgba(100,100,100,0.3), 0 2px 10px black;
 letter-spacing: 4px;
 }
 100% {
 text-shadow: 0 0 18px rgba(160,160,160,0.7), 0 0 5px rgba(200,200,200,0.5);
 letter-spacing: 7px;
 }
 }

 @keyframes linePulse {
 0% {
 opacity: 0.4;
 box-shadow: 0 0 2px rgba(150,150,150,0.3);
 }
 100% {
 opacity: 1;
 box-shadow: 0 0 8px rgba(200,200,200,0.6);
 }
 }

 html, body {
 width: 100%;
 height: 100%;
 background: black;
 }
 </style>
</head>
<body>

<div class="title-container">
 <div class="title-wrapper">
 <div class="title">Background Animation</div>
 </div>
</div>

<canvas id="blockCanvas"></canvas>

<script>
 (function() {
 // --- Configurações ---
 const canvas = document.getElementById('blockCanvas');
 const ctx = canvas.getContext('2d');

 let width, height;

 // --- CLASSE BLOCO (sobe de baixo para cima lentamente, com rotação contínua) ---
 class RisingRotatingBlock {
 constructor(x, y, size, speed, rotSpeed) {
 this.x = x; // posição x
 this.y = y; // posição y (começa na parte inferior)
 this.size = size; // tamanho (largura e altura)
 this.speed = speed; // velocidade de subida (px/frame) - positivo para cima
 this.rotation = Math.random() * Math.PI * 2; // rotação inicial aleatória
 this.rotSpeed = rotSpeed; // velocidade de rotação (rad/frame)
 }

 update() {
 // Sobe (diminui Y)
 this.y -= this.speed;
 // Rotação contínua
 this.rotation += this.rotSpeed;
 // Manter rotação dentro de um range para evitar overflow (opcional)
 if (this.rotation > Math.PI * 2) this.rotation -= Math.PI * 2;
 if (this.rotation < 0) this.rotation += Math.PI * 2;
 }

 // Calcula a cor baseado na posição Y (quanto mais em cima, mais escuro)
 // Quanto mais embaixo (próximo da base), mais claro/branco
 getCurrentColor() {
 // Mapeia a posição Y: y = height (base/branco) até y = -size (topo/preto)
 let t = this.y / height;
 // Quando y = height (base) -> t=1 (claro)
 // Quando y = 0 (meio) -> t=0 (escuro médio)
 // Quando y < 0 (acima do topo) -> t negativo (preto puro)
 t = Math.min(1, Math.max(0, t));
 // t=1 (base) -> valor alto (claro/branco), t=0 (topo) -> valor baixo (escuro/preto)
 const grayValue = Math.floor(30 + (220 * t));
 return `rgb(${grayValue}, ${grayValue}, ${grayValue})`;
 }

 draw(ctx) {
 ctx.save();
 // Centralizar a rotação no meio do bloco
 ctx.translate(this.x + this.size/2, this.y + this.size/2);
 ctx.rotate(this.rotation);
 
 const color = this.getCurrentColor();
 ctx.fillStyle = color;
 ctx.shadowBlur = 0;
 ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
 
 // Borda sutil para dar definição (cinza escuro)
 ctx.strokeStyle = `rgba(40, 40, 40, 0.8)`;
 ctx.lineWidth = 1.2;
 ctx.strokeRect(-this.size/2, -this.size/2, this.size, this.size);
 
 ctx.restore();
 }

 isOffscreen() {
 // Bloco saiu completamente pela parte superior
 return this.y + this.size < 0;
 }
 }

 let blocks = [];
 let blockSpawnCounter = 0;
 
 // Parâmetros - MOVIMENTO LENTO PARA CIMA
 const MAX_BLOCKS = 90;
 const BLOCK_SPAWN_RATE = 18; // frames entre spawns
 const MIN_SIZE = 12;
 const MAX_SIZE = 44;
 // Velocidade de subida (lenta, como flutuação)
 const MIN_SPEED = 0.4;
 const MAX_SPEED = 1.2;
 // Velocidade de rotação (contínua, varia entre valores positivos e negativos)
 const MIN_ROT_SPEED = 0.01;
 const MAX_ROT_SPEED = 0.045;

 // Função para redimensionar canvas
 function resizeCanvas() {
 width = window.innerWidth;
 height = window.innerHeight;
 canvas.width = width;
 canvas.height = height;
 }

 // Criar um novo bloco que nasce na parte inferior da tela
 function spawnBlock() {
 if (blocks.length >= MAX_BLOCKS + 10) return null;
 
 // Tamanho aleatório
 const size = MIN_SIZE + Math.random() * (MAX_SIZE - MIN_SIZE);
 // Posição X aleatória (respeitando bordas)
 const x = Math.random() * (width - size);
 // Posição Y: começa na base ou ligeiramente abaixo/na borda inferior
 const y = height - Math.random() * 25;
 // Velocidade de subida (lenta)
 const speed = MIN_SPEED + Math.random() * (MAX_SPEED - MIN_SPEED);
 // Velocidade de rotação (pode ser positiva ou negativa, para girar em ambos sentidos)
 const rotSpeed = (Math.random() - 0.5) * (MAX_ROT_SPEED - MIN_ROT_SPEED) * 2;
 // Garantir que não seja zero
 const finalRotSpeed = rotSpeed === 0 ? 0.02 : rotSpeed;
 
 return new RisingRotatingBlock(x, y, size, speed, finalRotSpeed);
 }
 
 // Spawn controlado de blocos
 function spawnSystematic() {
 if (blocks.length < MAX_BLOCKS) {
 if (blockSpawnCounter <= 0) {
 const newBlock = spawnBlock();
 if (newBlock) {
 blocks.push(newBlock);
 }
 blockSpawnCounter = BLOCK_SPAWN_RATE + Math.floor(Math.random() * 12);
 } else {
 blockSpawnCounter--;
 }
 } else {
 if (blockSpawnCounter > 0) blockSpawnCounter--;
 else blockSpawnCounter = 5;
 }
 
 // Spawn ocasional extra para manter densidade
 if (blocks.length < MAX_BLOCKS * 0.7 && Math.random() < 0.1 && blockSpawnCounter < 4) {
 const extra = spawnBlock();
 if (extra) blocks.push(extra);
 }
 }
 
 // Atualizar todos os blocos
 function updateBlocks() {
 for (let i = 0; i < blocks.length; i++) {
 blocks[i].update();
 }
 // Remover blocos que saíram da tela (pelo topo)
 blocks = blocks.filter(block => !block.isOffscreen());
 }
 
 // Desenhar o fundo preto e todos os blocos
 function drawScene() {
 if (!ctx) return;
 // Fundo preto absoluto
 ctx.clearRect(0, 0, width, height);
 ctx.fillStyle = "#000000";
 ctx.fillRect(0, 0, width, height);
 
 // Desenhar blocos (quanto mais acima, mais escuros; quanto mais abaixo, mais claros)
 for (let block of blocks) {
 block.draw(ctx);
 }
 
 // Efeito de profundidade: leve vinheta escura nas bordas para focar no título
 ctx.globalCompositeOperation = "source-over";
 const vignette = ctx.createRadialGradient(width/2, height/2, width*0.5, width/2, height/2, width*0.95);
 vignette.addColorStop(0, "rgba(0,0,0,0)");
 vignette.addColorStop(1, "rgba(0,0,0,0.45)");
 ctx.fillStyle = vignette;
 ctx.fillRect(0, 0, width, height);
 
 // Pequeno gradiente linear superior para dar sensação de "escuridão lá em cima"
 const topFade = ctx.createLinearGradient(0, 0, 0, height * 0.3);
 topFade.addColorStop(0, "rgba(0,0,0,0.6)");
 topFade.addColorStop(1, "rgba(0,0,0,0)");
 ctx.fillStyle = topFade;
 ctx.fillRect(0, 0, width, height);
 }
 
 // Loop de animação
 function animate() {
 updateBlocks();
 spawnSystematic();
 drawScene();
 requestAnimationFrame(animate);
 }
 
 // Tratar redimensionamento da tela
 function handleResize() {
 const newWidth = window.innerWidth;
 const newHeight = window.innerHeight;
 width = newWidth;
 height = newHeight;
 canvas.width = width;
 canvas.height = height;
 
 // Ao redimensionar, ajustar blocos para não ficarem fora dos limites laterais
 blocks = blocks.filter(block => {
 if (block.x + block.size < -block.size || block.x > width + block.size) return false;
 return true;
 });
 
 // Opcional: reposicionar blocos que ficariam muito abaixo (abaixo da nova altura)
 blocks.forEach(block => {
 if (block.y > height + block.size) {
 block.y = height - block.size;
 }
 });
 }
 
 window.addEventListener('resize', () => {
 handleResize();
 });
 
 // Inicialização
 function init() {
 resizeCanvas();
 
 // Popular com blocos iniciais em diferentes alturas (mas todos na parte inferior/média)
 const initialBlockCount = 35;
 for (let i = 0; i < initialBlockCount; i++) {
 const block = spawnBlock();
 if (block) {
 // Variar a posição inicial: alguns já um pouco acima para ter diversidade
 block.y = height - Math.random() * (height * 0.4);
 // Garantir que não fiquem muito acima (para não começarem muito escuros)
 if (block.y < height * 0.2) block.y = height * 0.6 + Math.random() * height * 0.3;
 blocks.push(block);
 }
 }
 
 blockSpawnCounter = 5;
 animate();
 }
 
 init();
 })();
</script>
</body>
</html>
